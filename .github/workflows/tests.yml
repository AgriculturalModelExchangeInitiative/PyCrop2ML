name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Python 3.${{ matrix.python-minor-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: utf-8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel]
        python-minor-version: [7, 8, 9, 10]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.${{ matrix.python-minor-version }}
        uses: actions/setup-python@v5
        with:
          python-version: 3.${{ matrix.python-minor-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s test -p "test_cyml_operations.py" -v
